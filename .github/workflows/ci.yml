name: CI

on:
  pull_request:
    types: [opened, synchronize, labeled, closed]
    branches: [main]
  workflow_dispatch:

jobs:
  dev-publish:
    if: github.event_name == 'workflow_dispatch' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@izgateway'

      - name: Run tests
        run: node --test src/test/*.test.js

      - name: Compute bump type
        id: bump
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q 'bump:major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q 'bump:minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish dev build
        run: |
          BUMP=${{ steps.bump.outputs.type }}
          NEXT=$(npm version $BUMP --no-git-tag-version | sed 's/^v//')
          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${NEXT}-dev.${{ github.run_number }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          npm publish --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@izgateway'

      - name: Run tests
        run: node --test src/test/*.test.js

      - name: Compute bump type
        id: bump
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q 'bump:major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q 'bump:minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and commit
        id: ver
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore: release v${VERSION} [skip ci]"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          git push

      - name: Publish release
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git tags
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          git tag -f "v${VERSION}"
          git tag -f "v${MAJOR}"
          git push origin "v${VERSION}" --force
          git push origin "v${MAJOR}" --force
